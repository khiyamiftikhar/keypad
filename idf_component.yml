version: "0.1.0"
description: "PWM-driven matrix keypad driver for ESP-IDF using row pulse-width encoding and MCPWM capture for simultaneous multi-key detection. Supports multiple keys per column with hardware-assisted decoding."
url: "https://github.com/embedblocks/matrix-keypad-pwm"
license: "MIT"

dependencies:
  idf: ">=5.0"

files:
   use_gitignore: true
   exclude:
      - ".git/**/*"
      - "docs/**/*"
      - "dist/**/*"
      - "*.docx"
      - "README.txt"      